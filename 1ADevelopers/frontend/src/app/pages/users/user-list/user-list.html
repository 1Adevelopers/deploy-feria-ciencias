<div class="user-container animate__animated animate__fadeIn">

    <!-- Cabecera de la sección -->
    <header class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="section-title">Usuarios</h2>
            <p class="text-muted small">Gestiona los miembros y permisos del ecosistema FlorApp.</p>
        </div>

        <!-- Botón Añadir Usuario (Arriba a la derecha) -->
        <button class="wp-button-green" routerLink="/admin/usuarios/nuevo">
            <i class="bi bi-person-plus-fill me-2"></i> Añadir nuevo usuario
        </button>
    </header>

    <!-- Contenedor de la Tabla -->
    <div class="table-card shadow-sm">
        <table class="table table-hover mb-0">
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Correo electrónico</th>
                    <th>Rol / Perfil</th>
                    <th class="text-end px-4">Acciones</th>
                </tr>
            </thead>
            <tbody>
                <!-- Si hay usuarios, se listan aquí -->
                <tr *ngFor="let user of users">
                    <td class="fw-bold text-dark">{{ user.nombre }}</td>
                    <td>{{ user.email }}</td>
                    <td>
                        <span class="badge-role" [ngClass]="{'bg-admin': user.rol === 'admin'}">
                            {{ user.rol === 'admin' ? 'Administrador' : 'Docente' }}
                        </span>
                    </td>
                    <td class="text-end px-4">
                        <!-- Botón Actualizar/Editar -->
                        <button class="btn-action btn-edit me-2" title="Editar usuario">
                            <i class="bi bi-pencil-fill"></i> Actualizar
                        </button>
                        <!-- Botón Borrar -->
                        <button class="btn-action btn-delete" (click)="eliminarUsuario(user.id)" title="Borrar usuario">
                            <i class="bi bi-trash3-fill"></i> Borrar
                        </button>
                    </td>
                </tr>

                <!-- Estructura vacía (se muestra si no hay datos) -->
                <tr *ngIf="users.length === 0">
                    <td colspan="4" class="text-center py-5">
                        <i class="bi bi-people text-muted opacity-25" style="font-size: 3rem;"></i>
                        <p class="mt-3 text-muted">No se encontraron usuarios. ¡Comienza añadiendo uno!</p>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
