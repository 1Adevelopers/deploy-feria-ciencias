<div class="wp-form-container">
    <h2>Añadir nuevo usuario</h2>
    <p class="subtitle">Crea un nuevo usuario y añádelo al ecosistema de FlorApp.</p>

    <!-- Enlazamos el formulario y la función de guardado -->
    <form [formGroup]="userForm" (ngSubmit)="onSubmit()" class="wp-form">

        <!-- Fila: Nombre -->
        <div class="form-row">
            <label for="nombre">Nombre de usuario (obligatorio)</label>
            <div class="input-wrapper">
                <input type="text" id="nombre" formControlName="nombre">
                <!-- Mensajes de error -->
                <span class="error-text"
                    *ngIf="userForm.get('nombre')?.touched && userForm.get('nombre')?.hasError('required')">El nombre es
                    requerido.</span>
                <span class="error-text"
                    *ngIf="userForm.get('nombre')?.touched && userForm.get('nombre')?.hasError('minlength')">Debe tener
                    al menos 3 letras.</span>
            </div>
        </div>

        <!-- Fila: Email -->
        <div class="form-row">
            <label for="email">Correo electrónico (obligatorio)</label>
            <div class="input-wrapper">
                <input type="email" id="email" formControlName="email">
                <span class="error-text"
                    *ngIf="userForm.get('email')?.touched && userForm.get('email')?.hasError('required')">El email es
                    requerido.</span>
                <span class="error-text"
                    *ngIf="userForm.get('email')?.touched && userForm.get('email')?.hasError('email')">Formato de correo
                    inválido.</span>
            </div>
        </div>

        <!-- Fila: Contraseña -->
        <div class="form-row">
            <label for="password">Contraseña (obligatorio)</label>
            <div class="input-wrapper">
                <input type="password" id="password" formControlName="password">
                <span class="error-text"
                    *ngIf="userForm.get('password')?.touched && userForm.get('password')?.hasError('required')">La
                    contraseña es obligatoria.</span>
                <span class="error-text"
                    *ngIf="userForm.get('password')?.touched && userForm.get('password')?.hasError('minlength')">Mínimo
                    6 caracteres.</span>
            </div>
        </div>

        <!-- Fila: Rol -->
        <div class="form-row">
            <label for="rol">Perfil</label>
            <div class="input-wrapper">
                <select id="rol" formControlName="rol">
                    <option value="" disabled>Seleccionar perfil...</option>
                    <option value="docente">Docente</option>
                    <option value="admin">Administrador</option>
                </select>
                <span class="error-text"
                    *ngIf="userForm.get('rol')?.touched && userForm.get('rol')?.hasError('required')">Debes seleccionar
                    un perfil.</span>
            </div>
        </div>

        <!-- Botón Submit -->
        
        <div class="form-actions">
            <button type="submit" class="wp-button" [disabled]="userForm.invalid">Añadir nuevo usuario</button>

            <!-- Botón para volver atrás -->
            <button class="btn btn-fredoka text-white" style="background-color: var(--principal-verde);"
                routerLink="/admin/usuarios">
                <a routerLink="/admin"
                    style="margin-left: 15px; color: #646970; text-decoration: none; font-size: 13px;">
                    Cancelar
                </a>
            </button>
        </div>
            

    </form>
</div>
