<div class="contact-container shadow-sm p-4 rounded-4">
  <h2 class="h4 mb-4 text-forest">Contacto</h2>

  <div class="mb-3">
    <label for="exampleFormControlInput1" class="form-label fw-medium">Tu correo electrónico</label>
    <input
      type="email"
      class="form-control custom-input"
      id="exampleFormControlInput1"
      placeholder="ejemplo@correo.com"
    />
  </div>

  <div class="mb-3">
    <label for="exampleFormControlTextarea1" class="form-label fw-medium"
      >Dejanos tu inquietud</label
    >
    <textarea
      class="form-control custom-input"
      id="exampleFormControlTextarea1"
      rows="4"
      placeholder="¿En qué podemos ayudarte?"
    ></textarea>
  </div>

  <div class="d-flex justify-content-center">
    <button type="submit" class="btn btn-verde px-5" routerLink="/notfound404">Enviar consulta</button>
  </div>
</div>
