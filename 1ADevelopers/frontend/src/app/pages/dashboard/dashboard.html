<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agregar Nuevo Usuario - Panel de Control</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .form-container { background: #fff; border: 1px solid #ccd0d4; box-shadow: 0 1px 1px rgba(0,0,0,.04); padding: 2rem; border-radius: 4px; }
        .form-label { font-weight: 600; color: #3c434a; }
        .description { font-size: 0.85rem; color: #646970; margin-top: 0.25rem; }
        .btn-wp { background-color: #2271b1; color: white; border: none; }
        .btn-wp:hover { background-color: #135e96; color: white; }
    </style>
</head>
<body>

<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-lg-9">
            <h2 class="mb-4">USUARIO</h2>
            <p class="mb-4">Alta de Usuario</p>

            <form class="form-container">
                <div class="row mb-4">
                    <label for="username" class="col-md-3 col-form-label form-label">Nombre de usuario (obligatorio)</label>
                    <div class="col-md-9">
                        <input type="text" class="form-control" id="username" required>
                    </div>
                </div>

                <div class="row mb-4">
                    <label for="email" class="col-md-3 col-form-label form-label">Correo electrónico (obligatorio)</label>
                    <div class="col-md-9">
                        <input type="email" class="form-control" id="email" required>
                    </div>
                </div>

                <div class="row mb-4">
                    <label for="first_name" class="col-md-3 col-form-label form-label">Nombre</label>
                    <div class="col-md-9">
                        <input type="text" class="form-control" id="first_name">
                    </div>
                </div>

                <div class="row mb-4">
                    <label for="last_name" class="col-md-3 col-form-label form-label">Apellidos</label>
                    <div class="col-md-9">
                        <input type="text" class="form-control" id="last_name">
                    </div>
                </div>

                <div class="row mb-4">
                    <label for="password" class="col-md-3 col-form-label form-label">Contraseña (obligatorio)</label>
                    <div class="col-md-9">
                        <input type="password" class="form-control" id="password" required>
                        <p class="description">Introduce una contraseña segura para este usuario.</p>
                    </div>
                </div>
                <div class="row mb-4">
                    <label for="confirm_password" class="col-md-3 col-form-label form-label">Confirmar contraseña</label>
                    <div class="col-md-9">
                        <input type="password" class="form-control" id="confirm_password" required>
                        <p class="description">Vuelve a escribir la contraseña para asegurarte de que es correcta.</p>
                    </div>
                </div>
                
                <p class="description">Los usuarios nuevos recibirán un correo electrónico sobre su cuenta.</p>
                <div class="row mb-4">
                    <label class="col-md-3 col-form-label form-label">Enviar aviso al usuario</label>
                    <div class="col-md-9">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="send_notification" checked>
                            <label class="form-check-label" for="send_notification">
                                Enviar al nuevo usuario un correo electrónico sobre su cuenta.
                            </label>
                        </div>
                    </div>
                </div>

                <div class="row mb-4">
                    <label for="role" class="col-md-3 col-form-label form-label">Perfil</label>
                    <div class="col-md-4">
                        <select class="form-select" id="role">
                            <option value="Docente">Docente</option>
                            <option value="administrator">Administrador</option>
                        </select>
                    </div>
                </div>

                <div class="row mt-5">
                    <div class="col-md-9 offset-md-3">
                        <button type="submit" class="btn btn-wp px-4 py-2">Añadir nuevo usuario</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
