<div class="login-container">

  <div class="login-card">

    <h1 class="titulo">Flora Autóctona</h1>

    <p class="texto">
      ¡Ingresá para explorar la naturaleza!
    </p>

    <form [formGroup]="form" (ngSubmit)="iniciarSesion()">

      <input 
        type="email"
        class="form-control custom-input"
        placeholder="Correo electrónico"
        formControlName="email"
      >

      <div
        class="error"
        *ngIf="form.get('email')?.invalid && form.get('email')?.touched"
      >

        <small *ngIf="form.get('email')?.errors?.['required']">
          El correo es obligatorio
        </small>

        <small *ngIf="form.get('email')?.errors?.['email']">
          El formato del mail debe ser válido
        </small>

      </div>
     
    

      <input 
        type="password"
        class="form-control custom-input"
        placeholder="Contraseña"
        formControlName="password"
      >

       <div
        class="error"
        *ngIf="form.get('password')?.invalid && form.get('password')?.touched"
      >

        <small *ngIf="form.get('password')?.errors?.['required']">
          La contraseña es obligatoria
        </small>

        <small *ngIf="form.get('password')?.errors?.['minlength']">
          La contraseña requiere como mínimo 6 caracteres
        </small>

      </div>

      

    
      <button type="submit">
        Entrar
      </button>

    </form>

    <p class="extra">
      Descubrí plantas y animales autóctonos
    </p>

  </div>

</div>
