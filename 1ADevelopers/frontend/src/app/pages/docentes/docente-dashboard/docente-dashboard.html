<div class="docente-container animate__animated animate__fadeIn">

    <!-- Cabecera -->
    <header class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="section-title">Docentes</h2>

            <p class="text-muted small">
                Gestiona los docentes registrados en FlorApp.
            </p>
        </div>

        <!-- Botón -->
        <button class="wp-button-green">
            <i class="bi bi-person-plus-fill me-2"></i>
            Añadir nuevo docente
        </button>
    </header>

    <!-- Tabla -->
    <div class="table-card shadow-sm">

        <table class="table table-hover mb-0">

            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Especialidad</th>
                    <th>Correo electrónico</th>
                    <th class="text-end px-4">Acciones</th>
                </tr>
            </thead>

            <tbody>

                <!-- Lista docentes -->
                <tr *ngFor="let docente of docentes">

                    <td class="fw-bold text-dark">
                        {{ docente.nombre }}
                    </td>

                    <td>
                        {{ docente.especialidad }}
                    </td>

                    <td>
                        {{ docente.email }}
                    </td>

                    <td class="text-end px-4">

                        <button class="btn-action btn-edit me-2">
                            <i class="bi bi-pencil-fill"></i>
                            Actualizar
                        </button>

                        <button class="btn-action btn-delete">
                            <i class="bi bi-trash3-fill"></i>
                            Borrar
                        </button>

                    </td>

                </tr>

                <!-- Vacío -->
                <tr *ngIf="docentes.length === 0">

                    <td colspan="4" class="text-center py-5">

                        <i class="bi bi-person-workspace text-muted opacity-25"
                            style="font-size: 3rem;">
                        </i>

                        <p class="mt-3 text-muted">
                            No se encontraron docentes registrados.
                        </p>

                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</div>
